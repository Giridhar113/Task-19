<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PraRoz</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

       

        .hero {
            width: 100%;
            height: 100vh;
            background: url("https://images.unsplash.com/photo-1772950399275-81eea958d92b?q=80&w=943&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            color: white;
        }

       

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 80px;
        }

      

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #ff7a00;
        }


        .menu a {
            color: white;
            text-decoration: none;
            margin-left: 40px;
            font-weight: 500;
        }

        .menu a:hover {
            color: #ff7a00;
        }

        

        .content {
            margin-top: 120px;
            padding-left: 80px;
            max-width: 550px;
        }

        .content h1 {
            font-size: 48px;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .content span {
            color: #ff7a00;
        }

        .content p {
            line-height: 1.6;
            margin-bottom: 25px;
        }

        

        .btn {
            background: #ff7a00;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            background: #e66b00;
        }
    </style>

</head>

<body>

    <div class="hero">

        <div class="navbar">

            <div class="logo">PraRoz</div>

            <div class="menu">
                <a href="#">HOME</a>
                <a href="#">ABOUT</a>
                <a href="#">SERVICE</a>
                <a href="#">DESIGN</a>
                <a href="#">CONTACT</a>
            </div>

        </div>

        <div class="content">

            <h1>Web Design & <br><span>Development</span> Course</h1>

            <p>
                Web Design is a specialisation of the design stream. They also use HTML,
                CSS, WYSIWYG editing software, mark up validators etc to create design elements.
            </p>

            <button class="btn">JOIN US</button>

        </div>

    </div>

</body>

</html>
